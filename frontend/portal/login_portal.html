<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>University Student Portal</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="../assets/css/portal.css" />
</head>

<body class="portal-bg">
  <div class="portal-card">
    <div class="portal-left">
      <div class="lang-switch">EN</div>

      <div class="portal-logo">
        <div class="logo-circle">U</div>
        <h2>University Student Portal</h2>
      </div>

      <div class="portal-actions">
        <div class="portal-action-item">
          <a href="./office_login.html" class="portal-login-btn">
            Office 365 ile Giriş
          </a>
        </div>

        <div class="portal-action-item">
          <a id="btn-biometric-login" href="../biometric/identify.html" class="portal-login-btn">
            Biometric Login
          </a>
        </div>
      </div>

      <p class="help-text">Office 365 ile Giriş için Yardım Videoları</p>
    </div>

    <div class="portal-right">
      <h3>Haberler ve Duyurular</h3>

      <div class="announcement">
        <span class="tag general">General</span>
        <p>2025-26 Bahar Dönemi Ders Başlangıcı</p>
      </div>

      <div class="announcement">
        <span class="tag rectorate">Rectorate</span>
        <p>Danışman Eşliğinde Ders Kayıtları</p>
      </div>

      <div class="announcement">
        <span class="tag transportation">Transportation</span>
        <p>Kampüs İçi Ring Servisleri Hakkında Duyuru</p>
      </div>
    </div>
  </div>

  <script defer src="../assets/js/portal.js"></script>
</body>

</html>
