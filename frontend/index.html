<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Multi-Modal Biometric Auth</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app-container">

    <!-- STEP 0: ENROLLMENT -->

<div class="card hidden" id="step-enroll">
  <h2>Enrollment</h2>

  <input id="username" placeholder="username" />
  <input id="role" placeholder="role (e.g. user)" value="user" />

  <div style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap;">
    <button class="btn" id="btnStartCam">Start Camera</button>
    <button class="btn" id="btnStopCam">Stop Camera</button>
  </div>

  <div style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-top:12px;">
    <button class="btn" id="btnStartEnroll">Start Enrollment</button>
    <button class="btn" id="btnStopEnroll">Stop Enrollment</button>
  </div>

  <p id="statusText">...</p>
  <p id="sessionText">Session: -</p>
  <p id="progressText">0/15</p>

  <div style="width: 300px; height: 10px; background: #ddd; border-radius: 8px; overflow:hidden; margin: 0 auto;">
    <div id="progressBar" style="width:0%; height:100%; background:#4caf50;"></div>
  </div>

  <video id="camVideo" autoplay playsinline style="width:320px; border-radius:10px; margin-top:16px;"></video>
  <canvas id="camCanvas" style="display:none;"></canvas>

  <button class="btn" style="margin-top:16px;" onclick="restart()">Back</button>
</div>


    <!-- STEP 1: COMPANY -->
    <div class="card" id="step-company">
      <h2>Choose a Company</h2>
      <button class="btn" onclick="selectCompany('A')">Company A</button>
      <button class="btn" onclick="selectCompany('B')">Company B</button>
      <button class="btn" onclick="selectCompany('C')">Company C</button>
      <button class="btn" onclick="showStep('step-enroll');startCamera();">Enroll</button>
    </div>

    <!-- STEP 2: IDENTIFICATION TYPE -->
    <div class="card hidden" id="step-method">
      <h2>Choose the Type of Identification</h2>
      <button class="btn" onclick="selectMethod('face')">Face Recognition</button>
      <button class="btn" onclick="selectMethod('voice')">Voice Recognition</button>
    </div>

    <!-- STEP 3: FACE CAPTURE -->
    <div class="card hidden" id="step-face">
      <h2>Visual Identification</h2>
      <p>Please look at the camera</p>

      <video id="video" autoplay></video>
      <canvas id="canvas" class="hidden"></canvas>

      <button class="btn" onclick="captureFace()">Capture</button>
    </div>

    <!-- STEP 3B: VOICE -->
<div class="card hidden" id="step-voice">
  <h2>Voice Identification</h2>
  <p>Please speak for 3-5 seconds</p>

  <div style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap;">
    <button class="btn" id="btn-voice-start" onclick="startVoiceRecord()">Start</button>
    <button class="btn" id="btn-voice-stop" onclick="stopVoiceRecord()" disabled>Stop</button>
    <button class="btn" id="btn-voice-send" onclick="sendVoice()" disabled>Send</button>
  </div>

  <audio id="audio-preview" class="hidden" controls style="margin-top:16px; width:100%;"></audio>
</div>


    <!-- STEP 4: RESULT -->
<div class="card hidden" id="step-result">
  <h2>Authentication Result</h2>

  <p id="result-decision"></p>

  <div class="score-box">
    <p>Face Score: <span id="face-score"></span></p>
    <p>Voice Score: <span id="voice-score"></span></p>
    <p>Fusion Score: <span id="fusion-score"></span></p>
  </div>

  <button class="btn" onclick="restart()">Restart</button>
</div>

  </div>

  <script src="app.js"></script>
</body>
</html>
