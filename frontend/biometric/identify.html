<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Identify | Biometric Module</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>

<body data-page="identify">
  <div class="app-container">

    <!-- STEP 1: FACE -->
    <div class="card" id="step-face">
      <h2>Face</h2>
      <p>Please look at the camera.</p>

      <video id="video" autoplay playsinline></video>
      <canvas id="canvas" class="hidden"></canvas>

      <button class="btn" id="btnCamStart" type="button">Start Camera</button>
      <button class="btn" id="btnFaceCapture" type="button">Capture Face</button>
      <a
        class="btn"
        id="btnBack"
        href="../portal/login_portal.html"
        style="display:inline-block; text-decoration:none; text-align:center;"
      >Back</a>

      <p id="faceStatus" class="muted" style="margin-top:10px;"></p>
    </div>

    <!-- STEP 2: VOICE -->
    <div class="card hidden" id="step-voice">
      <h2>Voice</h2>
      <p>Please speak for 3–5 seconds.</p>

      <div style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap;">
        <button class="btn" id="btnVoiceStart" type="button">Start</button>
        <button class="btn" id="btnVoiceStop" type="button" disabled>Stop</button>
      </div>

      <audio
        id="audioPreview"
        class="hidden"
        controls
        style="margin-top:16px; width:100%;"
      ></audio>

      <p id="voiceStatus" class="muted" style="margin-top:10px;"></p>
    </div>

    <!-- STEP 3: VERIFY -->
    <div class="card hidden" id="step-verify">
      <h2>Verify</h2>
      <p>Send face + voice to backend.</p>

      <button class="btn" id="btnVerify" type="button" disabled>Verify</button>
      <button class="btn" id="btnRestart" type="button" style="margin-top:12px;">Restart</button>

      <p id="statusText" class="muted" style="margin-top:10px;"></p>
    </div>

    <!-- STEP 4: RESULT -->
    <div class="card hidden" id="step-result">
      <h2>Result</h2>

      <p id="result-decision"></p>

      <div class="score-box">
        <p>Face Score: <span id="face-score">-</span></p>
        <p>Voice Score: <span id="voice-score">-</span></p>
        <p>Fusion Score: <span id="fusion-score">-</span></p>
      </div>

      <button class="btn" id="btnRestartResult" type="button">Restart</button>
    </div>

  </div>

  <script type="module" src="../assets/js/index.js"></script>
</body>
</html>
